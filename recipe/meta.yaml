{% set name = "outlines-core" %}
{% set version = "0.1.26" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/outlines_core-{{ version }}.tar.gz
  sha256: 481c4301341e77cc8f1832d616784adb4d461b4fec65878e7c0d2cba7163a189

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools
   # - setuptools-scm
    #- setuptools-rust
    - pip
  run:
    - python >=3.8
    - interegular
    - jsonschema

test:
  imports:
    - outlines_core
  commands:
    - pip check
  requires:
    - pip

about:
  summary: Structured Text Generation in Rust
  license: Apache-2.0
  license_file:
    #- THIRDPARTY.yml
    - LICENSE
  homepage: https://github.com/dottxt-ai/outlines-core
  repository: https://github.com/dottxt-ai/outlines-core

extra:
  anaconda-services:
    ref: https://anaconda.zendesk.com/agent/tickets/49522
    reason: Dependency for vllm
  recipe-maintainers:
    - ianaobi
    - bkreider
  recipe-maintainers:
    - hadim
    - maresb
