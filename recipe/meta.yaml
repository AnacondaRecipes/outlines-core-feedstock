{% set name = "outlines-core" %}
{% set version = "0.1.26" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/outlines_core-{{ version }}.tar.gz
  sha256: 481c4301341e77cc8f1832d616784adb4d461b4fec65878e7c0d2cba7163a189


build:
  script:
    - "{{ PYTHON }} -m pip install --no-deps --no-build-isolation --ignore-installed ."
  number: 0
  skip: true  # [win]  # Uncomment if this package doesn't support Windows

requirements:
  build:
    - {{ compiler('rust') }}  # Ensure the Rust compiler is installed
    - {{ compiler('cxx') }}
    - cargo-bundle-licenses
    - pkg-config

  host:
    - python
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
    - setuptools-rust  # Ensure Rust build support

  run:
    - python

test:
  imports:
    - outlines_core.fsm.outlines_core_rs  # Verify Rust extension loads correctly

about:
  home: https://github.com/your-repo/outlines-core
  license: MIT
  summary: "A core library for Outlines framework."

extra:
  anaconda-services:
    ref: https://anaconda.zendesk.com/agent/tickets/49522
    reason: Dependency for vllm
  recipe-maintainers:
    - ianaobi
    - bkreider
  recipe-maintainers:
    - hadim
    - maresb
